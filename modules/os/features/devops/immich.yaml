apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-deployment
spec:
  selector:
    matchLabels:
      app: immich-pod
  replicas: 2
  template:
    metadata:
      labels:
        app: immich-pod
    spec:
      containers:
        - name: immich-container
          image: ghcr.io/immich-app/immich-server
          ports:
          - containerPort: 2283
            name: immich-port
